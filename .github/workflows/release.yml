name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Version or publish package
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Attach workflow run branch
        if: github.event_name == 'workflow_run'
        run: git switch --force-create "${{ github.event.workflow_run.head_branch }}" "${{ github.event.workflow_run.head_sha }}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit release plan
        run: pnpm run release:audit

      - name: Verify npm trusted publishing toolchain
        run: |
          set -euo pipefail
          node --version
          npm --version
          pnpm --version

      - name: Create version PR or publish package
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run changeset:version
          publish: pnpm run changeset:publish
          commit: 'release: version package'
          title: 'release: version package'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve GitHub release title
        id: release_title
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
          const packageInfo = packages.find((item) => item.name === '@algoux/standard-ranklist-cli') || packages[0];
          if (!packageInfo?.name || !packageInfo?.version) {
            throw new Error(`Unable to resolve published package from: ${process.env.PUBLISHED_PACKAGES || '[]'}`);
          }
          console.log(`tag=${packageInfo.name}@${packageInfo.version}`);
          console.log(`title=v${packageInfo.version}`);
          NODE

      - name: Normalize GitHub release title
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit '${{ steps.release_title.outputs.tag }}' --title '${{ steps.release_title.outputs.title }}'
